<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sozyn | Coming Soon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') no-repeat center/cover;
  position: relative;
}

/* Dark overlay */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  top: 0;
  left: 0;
}

/* Glass card */
.container {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 500px;
  width: 90%;
  padding: 40px 25px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  animation: fadeIn 1.2s ease;
}

.logo {
  width: 480px;
  margin-bottom: 15px;
  animation: float 3s ease-in-out infinite;
}

/* Animations */
@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-8px);}
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 1rem;
  opacity: 0.85;
  margin-bottom: 20px;
}

.tagline {
  font-size: 0.95rem;
  margin-bottom: 25px;
  color: #ddd;
}

/* Email box */
.email-box {
  display: flex;
  margin-bottom: 15px;
}

.email-box input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 8px 0 0 8px;
}

.email-box button {
  padding: 12px 18px;
  border: none;
  background: linear-gradient(45deg, #ff5722, #ff9800);
  color: white;
  cursor: pointer;
  border-radius: 0 8px 8px 0;
  transition: 0.3s;
  font-weight: bold;
}

.email-box button:hover {
  transform: scale(1.05);
}

/* Trust text */
.trust {
  font-size: 0.8rem;
  opacity: 0.7;
  margin-top: 10px;
}

/* Footer */
.footer {
  margin-top: 20px;
  font-size: 0.75rem;
  opacity: 0.6;
}

/* Mobile */
@media (max-width: 500px) {
  h1 { font-size: 1.8rem; }
}

body {
  min-height: 100vh;
}

@media (max-width: 500px) {
  h1 {
    font-size: 1.8rem;
  }

  .container {
    padding: 25px 15px;
  }
.logo {
  display: block;
  margin: 0 auto 15px auto;
  width: 200%;
  max-width: 300px;
}

  .email-box {
    flex-direction: column;
  }

  .email-box input {
    border-radius: 8px;
    margin-bottom: 10px;
  }

  .email-box button {
    border-radius: 8px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="https://lh3.googleusercontent.com/d/1W5O1MBHxLb_Am6Ci2zyEKy0xfB6FJDvy" class="logo">

  <h1>Hire Smarter. Faster. 🚀</h1>

  <p class="subtitle">
    Connecting employers with the right talent effortlessly.
  </p>
  
  <p>🔒 A simple and secure solution for your hiring needs.</p>
  <p class="tagline">
    <strong>Sign up for our newsletter to learn more.</strong>
  </p>

  <!-- EMAIL -->
  <div class="email-box">
  <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd3-XMaocZzUGPUwlTfA27Ehu1QirBxepJDULckXtmHo4B_Bw/viewform', '_blank')">
    Subscribe for Newsletter
  </button>
</div>

  <!-- FOOTER -->
  <div class="footer">
    Contact: info@sozyn.co.in
  </div>

</div>

</body>
</html>
